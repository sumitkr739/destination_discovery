name: Keep Services Alive

on:
  schedule:
    # Run every 12 minutes
    - cron: '*/12 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          echo "Pinging backend..."
          curl -f https://destination-discovery.onrender.com/health || echo "Backend ping failed"
          
      - name: Ping Frontend
        run: |
          echo "Pinging frontend..."
          curl -f https://destination-discovery-t4sl.vercel.app || echo "Frontend ping failed"
          
      - name: Log Status
        run: |
          echo "Keep-alive ping completed at $(date)"
